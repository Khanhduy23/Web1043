<body>
    <script>
        let lop = "WB20201",

        // let a = prompt('Nhập cạnh a: '),

        let ca = prompt('Nhập chiều cao: '),
            na = prompt('Nhập cân nặng: '),
            bmi = na / Math.pow( ca, 2);

     <h2>Cạnh a: <span>
